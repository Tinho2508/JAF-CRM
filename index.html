function toDateYM(d){if(!d)return '';if(d instanceof Date){if(isNaN(d.getTime()))return '';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}var s=(d||'').toString().trim();if(!s)return '';var v=parseFloat(s);if(!isNaN(v)&&v>20000&&v<70000){var ep=new Date(1899,11,30);var dt=new Date(ep.getTime()+v*86400000);if(!isNaN(dt.getTime()))return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')}if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s.substring(0,7);if(/^\d{4}-\d{2}$/.test(s))return s;if(/^\d{1,2}[\\/]\d{1,2}[\\/]\d{4}$/.test(s)){var pt=s.split(/[/\\/]/);return pt[2]+'-'+String(parseInt(pt[1])).padStart(2,'0')}if(/^\d{4}$/.test(s))return s;return s.substring(0,7)}
function dateMatchesYM(dateVal,yr,mo){if(!dateVal)return false;if(dateVal instanceof Date){var dy=String(dateVal.getFullYear());var dm=String(dateVal.getMonth()+1).padStart(2,'0');return dy===yr&&(!mo||dm===mo)}var s=(dateVal||'').toString().trim();if(!s)return false;if(/^\d{4}-\d{2}-\d{2}$/.test(s)){var ds=s.split('-');if(ds[0]===yr&&(!mo||ds[1]===mo))return true}if(/^\d{1,2}[\\/]\d{1,2}[\\/]\d{4}$/.test(s)){var pt=s.split(/[/\\]/);var yy=pt[pt.length-1];var mm=String(parseInt(pt[1])).padStart(2,'0');if(yy===yr&&(!mo||mm===mo))return true}if(/^\d{1,2}[\\/]\d{4}$/.test(s)){var pt2=s.split(/[/\\]/);if(pt2[pt2.length-1]===yr&&(!mo||String(parseInt(pt2[0])).padStart(2,'0')===mo))return true}if(/^\d{4}-\d{2}$/.test(s)){var ds2=s.split('-');if(ds2[0]===yr&&(!mo||ds2[1]===mo))return true}if(/^\d{4}$/.test(s)&&s===yr&&!mo)return true;return false}

/* IndexedDB */
var idb={_db:null,_ready:false,_queue:[],
init:function(){var self=this;return new Promise(function(res,rej){var r=indexedDB.open('jaf_crm_v31',2);r.onupgradeneeded=function(e){var d=e.target.result;TABELAS.forEach(function(t){if(!d.objectStoreNames.contains(t))d.createObjectStore(t,{keyPath:'id'})});if(!d.objectStoreNames.contains('deleted_ids'))d.createObjectStore('deleted_ids',{keyPath:'id'})};r.onsuccess=function(e){self._db=e.target.result;self._ready=true;while(self._queue.length)self._queue.shift()();res()};r.onerror=function(e){rej(e.target.error)}})},
getAll:function(table){var self=this;return new Promise(function(res){if(!self._ready){self._queue.push(function(){self.getAll(table).then(res)});return}try{var tx=self._db.transaction(table,'readonly');var store=tx.objectStore(table);var req=store.getAll();req.onsuccess=function(){res(req.result||[])};req.onerror=function(){res([])}}catch(e){res([])}})},
setTable:function(table,data){var self=this;return new Promise(function(res,rej){if(!self._ready){self._queue.push(function(){self.setTable(table,data).then(res)});return}try{var tx=self._db.transaction(table,'readwrite');var store=tx.objectStore(table);store.clear();data.forEach(function(item){store.put(item)});tx.oncomplete=function(){res()}}catch(e){if(e.name==='InvalidStateError'){self._ready=false;self._db=null;self.init().then(function(){self.setTable(table,data).then(res)})}else{rej(e)}}})},
bulkPut:function(table,items){var self=this;return new Promise(function(res,rej){if(!self._ready){self._queue.push(function(){self.bulkPut(table,items).then(res)});return}try{var tx=self._db.transaction(table,'readwrite');var store=tx.objectStore(table);items.forEach(function(item){store.put(item)});tx.oncomplete=function(){res()}}catch(e){if(e.name==='InvalidStateError'){self._ready=false;self._db=null;self.init().then(function(){self.bulkPut(table,items).then(res)})}else{rej(e)}}})},
addDeletedId:function(table,id){var self=this;return new Promise(function(res){if(!self._ready){self._queue.push(function(){self.addDeletedId(table,id).then(res)});return}try{var tx=self._db.transaction('deleted_ids','readwrite');tx.objectStore('deleted_ids').put({id:id,table:table,deleted_at:new Date().toISOString()});tx.oncomplete=function(){res()}}catch(e){res()}})},
getDeletedIds:function(){var self=this;return new Promise(function(res){if(!self._ready){self._queue.push(function(){self.getDeletedIds().then(res)});return}try{var tx=self._db.transaction('deleted_ids','readonly');var req=tx.objectStore('deleted_ids').getAll();req.onsuccess=function(){res(req.result||[])};req.onerror=function(){res([])}}catch(e){res([])}})},
clearDeletedIds:function(){var self=this;return new Promise(function(res){if(!self._ready){self._queue.push(function(){self.clearDeletedIds().then(res)});return}try{var tx=self._db.transaction('deleted_ids','readwrite');tx.objectStore('deleted_ids').clear();tx.oncomplete=function(){res()}}catch(e){res()}})}
};

function toast(m,t){t=t||'success';var c=document.getElementById('toast-container');var el=document.createElement('div');el.className='toast toast-'+t;el.innerHTML=(t==='success'?'&#x2705;':t==='warning'?'&#x26A0;&#xFE0F;':'&#x274C;')+' '+m;c.appendChild(el);setTimeout(function(){el.remove()},3500)}

function fmtBRL(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v)||0)}
function fmtDate(d){if(!d)return'\u2014';try{return new Date(d+'T00:00:00').toLocaleDateString('pt-BR')}catch(e){return d}}
function today(){return new Date().toISOString().split('T')[0]}
function mergeData(local,remote){var map={};local.forEach(function(item){if(item&&item.id)map[item.id]=item});remote.forEach(function(item){if(item&&item.id)map[item.id]=item});return Object.keys(map).map(function(k){return map[k]})}
function deduplicateRecords(table,data){var seen={};var unique=[];var keyMap={clientes:'nome',apolices:'numero_apolice',leads:'nome_cliente',propostas:'numero_proposta'};var key=keyMap[table]||null;if(!key)return data;for(var i=0;i<data.length;i++){var item=data[i];var val=item[key];if(!val||!val.toString().trim()){unique.push(item);continue}var cleanVal=val.toString().trim().toLowerCase();if(!seen[cleanVal]){seen[cleanVal]=item;unique.push(item)}else{var existing=seen[cleanVal];if(item.criado_em&&(!existing.criado_em||item.criado_em>=existing.criado_em)){var idx=unique.indexOf(existing);if(idx>=0)unique[idx]=item;seen[cleanVal]=item}}}return unique}
function daysUntil(date){if(!date)return 9999;var diff=new Date(date+'T00:00:00')-new Date();return Math.ceil(diff/86400000)}
function escHtml(s){var div=document.createElement('div');div.textContent=s||'';return div.innerHTML}
function escJs(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function nextId(){return crypto.randomUUID?crypto.randomUUID():([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,function(c){var r=Math.random()*16|0;return(c=="8"?r&3|8:r).toString(16)})}
function normalizar(s){return s.toString().toLowerCase().replace(/[\u00E1\u00E0\u00E3\u00E2\u00E4]/g,'a').replace(/[\u00E9\u00E8\u00EA\u00EB]/g,'e').replace(/[\u00ED\u00EC\u00EE\u00EF]/g,'i').replace(/[\u00F3\u00F2\u00F5\u00F4\u00F6]/g,'o').replace(/[\u00FA\u00F9\u00FB\u00FC]/g,'u').replace(/\u00E7/g,'c').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim()}
function statusBadge(s){var m={'Ativa':'success','Ativo':'success','Aprovada':'success','Fechado':'success','Pago':'success','Concluido':'success','Aprovado':'success','Vencida':'danger','Cancelada':'neutral','Cancelado':'neutral','Em Analise':'info','Novo':'info','Em Contato':'info','Proposta Enviada':'warning','Negociacao':'warning','Perdido':'danger','Recusada':'danger','Recusado':'danger','Registrado':'info','Agendado':'info','Pendente':'warning','Suspensa':'neutral','Concluida':'success','Convertida':'success'};return'<span class="badge badge-'+(m[s]||'neutral')+'">'+escHtml(s)+'</span>'}

/* Sync */
async function sincronizar(){if(!window.supabaseClient)return;var dot=document.getElementById('status-dot');var txt=document.getElementById('status-text');if(dot){dot.className='status-dot syncing';txt.textContent='Sincronizando...'}try{var total=0;var client=window.supabaseClient;for(var i=0;i<TABELAS.length;i++){var table=TABELAS[i];try{var localData=await idb.getAll(table);var res=await client.from(table).select('*');if(res.error){console.warn('Skip '+table+':',res.error.message);continue}var remoteData=res.data||[];if(remoteData.length>0){var merged=mergeData(localData,remoteData);merged=deduplicateRecords(table,merged);var dIds=await idb.getDeletedIds();var dft=dIds.filter(function(d){return d.table===table}).map(function(d){return d.id});if(dft.length&&merged.length)merged=merged.filter(function(r){return dft.indexOf(r.id)<0});var keyMap={clientes:'nome',apolices:'nome_cliente',leads:'nome_cliente',propostas:'nome_cliente',producao:'nome',sinistros:'cliente',agenda:'cliente'};var ck=keyMap[table]||'nome';await idb.setTable(table,merged);cacheData[table]=merged;total+=merged.length}else if(localData.length>0){var dIds2=await idb.getDeletedIds();var dft2=dIds2.filter(function(d){return d.table===table}).map(function(d){return d.id});if(dft2.length&&localData.length)localData=localData.filter(function(r){return dft2.indexOf(r.id)<0});await idb.setTable(table,localData);cacheData[table]=localData;total+=localData.length;var keyMap2={clientes:'nome',apolices:'nome_cliente',leads:'nome_cliente',propostas:'nome_cliente',producao:'nome',sinistros:'cliente',agenda:'cliente'};var ck2=keyMap2[table]||'nome';localData=localData.filter(function(r){return r[ck2]&&r[ck2].toString().trim().length>0});var allowed2=ALLOWED_COLS[table]||null;var cleanLD=localData.map(function(r){var o={};for(var k in r){if(!r.hasOwnProperty(k))continue;if(k&&k.trim().length>0&&!/^Col\d+$/.test(k)){if(allowed2){if(allowed2.indexOf(k)>=0){var v=r[k];if(v===''&&(k.indexOf('data')>=0||k.indexOf('vcto')>=0||k.indexOf('vig')>=0||k.indexOf('emissao')>=0||k.indexOf('criado')>=0||k.indexOf('dt')>=0||k.indexOf('updated')>=0||k.indexOf('venc')>=0))v=null;o[k]=v}}else{var v=r[k];if(v===''&&(k.indexOf('data')>=0||k.indexOf('vcto')>=0||k.indexOf('vig')>=0||k.indexOf('emissao')>=0||k.indexOf('criado')>=0||k.indexOf('dt')>=0||k.indexOf('updated')>=0||k.indexOf('venc')>=0))v=null;o[k]=v}}}return sanitizeRow(o,table)});var sendRes=await Promise.race([client.from(table).upsert(cleanLD,{onConflict:'id'}),new Promise(function(_,rej){setTimeout(function(){rej(new Error('Timeout upsert'))},8000)})]);if(sendRes.error)throw new Error('Send err '+table+': '+sendRes.error.message)}else{await idb.setTable(table,[]);cacheData[table]=[]}}catch(te){if(te.message&&te.message.indexOf('Timeout')>=0)throw te;toast('Erro sync '+table+': '+te.message,'error');console.error('Sync error '+table,te);var ld=await idb.getAll(table);if(ld&&ld.length){cacheData[table]=ld;total+=ld.length}}}if(dot){dot.className='status-dot online';txt.textContent='Online ('+total+')'}if(total>0)toast(total+' registros sincronizados!');else toast('Nenhum dado novo');render();updateBadges()}catch(e){if(dot)dot.className='status-dot';if(txt)txt.textContent='Offline';toast('Erro sync: '+e.message,'error');console.error('Sync fatal:',e)}}
function limparDadosExemplo(){var seedNames={clientes:['Joao Silva','Maria Santos'],apolices:['AP-001','AP-002'],leads:['Carlos Oliveira'],propostas:['PR-001']};var total=0;var tables=Object.keys(seedNames);tables.forEach(function(t){var data=getTable(t);var antes=data.length;data=data.filter(function(r){if(t==='apolices')return seedNames[t].indexOf(r.numero_apolice)<0;if(t==='propostas')return seedNames[t].indexOf(r.numero_proposta)<0;return seedNames[t].indexOf(r.nome||r.nome_cliente||r.cliente)<0});var removidos=antes-data.length;if(removidos>0){cacheData[t]=data;idb.setTable(t,data);total+=removidos;enviarTabela(t)}});if(total>0){toast(total+' registros de exemplo removidos!');render();updateBadges()}else{toast('Nenhum registro de exemplo encontrado')}}

async function enviarSupabase(){if(!window.supabaseClient){toast('Supabase nao configurado','error');return}var dot=document.getElementById('status-dot');var txt=document.getElementById('status-text');if(dot){dot.className='status-dot syncing';txt.textContent='Enviando...'}try{var total=0;var client=window.supabaseClient;for(var i=0;i<TABELAS.length;i++){var table=TABELAS[i];var rows=await idb.getAll(table);if(!rows.length)continue;var allowed=ALLOWED_COLS[table]||null;var clean=rows.map(function(r){var o={};for(var k in r){if(!r.hasOwnProperty(k))continue;if(k&&k.trim().length>0&&!/^Col\d+$/.test(k)){if(allowed){if(allowed.indexOf(k)>=0){var v=r[k];if(v===''&&(k.indexOf('data')>=0||k.indexOf('vcto')>=0||k.indexOf('vig')>=0||k.indexOf('emissao')>=0||k.indexOf('criado')>=0||k.indexOf('dt')>=0||k.indexOf('updated')>=0||k.indexOf('venc')>=0))v=null;o[k]=v}}else{var v=r[k];if(v===''&&(k.indexOf('data')>=0||k.indexOf('vcto')>=0||k.indexOf('vig')>=0||k.indexOf('emissao')>=0||k.indexOf('criado')>=0||k.indexOf('dt')>=0||k.indexOf('updated')>=0||k.indexOf('venc')>=0))v=null;o[k]=v}}}return sanitizeRow(o,table)});var res=await client.from(table).upsert(clean,{onConflict:'id'});if(res.error)throw res.error;total+=rows.length}if(dot){dot.className='status-dot online';txt.textContent='Online ('+total+')'}toast(total+' enviados!')}catch(e){if(dot){dot.className='status-dot';txt.textContent='Offline'}toast('Erro: '+e.message,'error')}}

function salvarLead(){var leads=getTable('leads');var obj={id:leadEdit?leadEdit.id:nextId(),nome_cliente:document.getElementById('lead-nome').value.trim(),telefone:document.getElementById('lead-tel').value,whatsapp:document.getElementById('lead-wpp').value,email:document.getElementById('lead-email').value,interesse:document.getElementById('lead-interesse').value,origem:document.getElementById('lead-origem').value,status:document.getElementById('lead-status').value,observacoes:document.getElementById('lead-obs').value,criado_em:leadEdit?leadEdit.criado_em:today()};if(!obj.nome_cliente){toast('Nome obrigatorio','error');return}if(!leadEdit&&leads.some(function(l){return l.id!==obj.id&&l.nome_cliente&&l.nome_cliente.toString().trim().toLowerCase()===obj.nome_cliente.toLowerCase()})){toast('Lead ja existe com este nome','error');return}if(leadEdit){var idx=-1;for(var i=0;i<leads.length;i++){if(leads[i].id===obj.id){idx=i;break}}if(idx>=0)leads[idx]=obj}else leads.push(obj);idb.setTable('leads',leads).then(function(){cacheData.leads=leads;fecharModal('modal-lead');toast(leadEdit?'Atualizado!':'Cadastrado!');leadEdit=null;render();updateBadges();enviarTabela('leads')})}
function salvarCliente(){var clientes=getTable('clientes');var obj={id:clienteEdit?clienteEdit.id:nextId(),nome:document.getElementById('cli-nome').value.trim(),cpf_cnpj:document.getElementById('cli-cpf').value,telefone:document.getElementById('cli-tel').value,whatsapp:document.getElementById('cli-wpp').value,email:document.getElementById('cli-email').value,cidade:document.getElementById('cli-cidade').value,estado:document.getElementById('cli-uf').value,status:document.getElementById('cli-status').value,observacoes:document.getElementById('cli-obs').value,criado_em:clienteEdit?clienteEdit.criado_em:today()};if(!obj.nome){toast('Nome obrigatorio','error');return}if(!clienteEdit&&clientes.some(function(c){return c.id!==obj.id&&c.nome&&c.nome.toString().trim().toLowerCase()===obj.nome.toLowerCase()})){toast('Cliente ja existe com este nome','error');return}if(clienteEdit){var idx=-1;for(var i=0;i<clientes.length;i++){if(clientes[i].id===obj.id){idx=i;break}}if(idx>=0)clientes[idx]=obj}else clientes.push(obj);idb.setTable('clientes',clientes).then(function(){cacheData.clientes=clientes;fecharModal('modal-cliente');toast(clienteEdit?'Atualizado!':'Cadastrado!');clienteEdit=null;render();updateBadges();enviarTabela('clientes')})}

function renderRelatorios(){var clientes=getTable('clientes'),apolices=getTable('apolices'),leads=getTable('leads'),propostas=getTable('propostas'),producao=getTable('producao'),sinistros=getTable('sinistros');var ativas=apolices.filter(function(a){return a.status==='Ativa'});var taxaConv=leads.length?((leads.filter(function(l){return l.status==='Fechado'||l.status==='Convertida'}).length/leads.length)*100).toFixed(1):0;var mes=today().substring(0,7);var prodMes=producao.filter(function(p){return toDateYM(p.data_debito)===mes});var premioMes=prodMes.reduce(function(s,p){return s+(parseFloat(p.valor_total||p.valor||p.premio)||0)},0);var comissaoMes=prodMes.reduce(function(s,p){return s+(parseFloat(p.comissao_total||p.comissao)||0)},0);var ticketMedio=ativas.length?(ativas.reduce(function(s,a){return s+(a.premio_total||0)},0)/ativas.length):0;var prodRamo={};ativas.forEach(function(a){var r=a.ramo||'Outros';prodRamo[r]=(prodRamo[r]||0)+(a.premio_total||0)});var comMeses={};producao.forEach(function(p){var m=toDateYM(p.data_debito);if(m)comMeses[m]=(comMeses[m]||0)+(parseFloat(p.comissao_total||p.comissao)||0)});var meses=Object.keys(comMeses).sort().slice(-6);var maxM=Math.max.apply(null,meses.map(function(m){return comMeses[m]}).concat([1]));var topCli={};apolices.forEach(function(a){if(!topCli[a.nome_cliente])topCli[a.nome_cliente]={qtd:0,total:0};topCli[a.nome_cliente].qtd++;topCli[a.nome_cliente].total+=(a.premio_total||0)});var top=Object.entries(topCli).sort(function(a,b){return b[1].total-a[1].total}).slice(0,10);var sinRamo={};sinistros.forEach(function(s){var r=s.tipo||'Outro';sinRamo[r]=(sinRamo[r]||0)+1});var sinTop=Object.keys(sinRamo).sort(function(a,b){return sinRamo[b]-sinRamo[a]}).slice(0,6);var maxSi=Math.max.apply(null,Object.values(sinRamo).concat([1]));var mesH='';if(meses.length){for(var i=0;i<meses.length;i++){var m=meses[i];var v=comMeses[m];var h=Math.max(4,(v/maxM)*70);mesH+='<div style="flex:1;text-align:center"><div style="font-size:10px;col ottom:24px"><div class="card"><div class="card-header"><div class="card-title">Comissao Mensal</div></div><div style="padding:20px"><div class="chart-bar" style="gap:8px;height:80px">'+mesH+'</div></div></div><div class="card"><div class="card-header"><div class="card-title">Sinistros por Tipo</div></div><div style="padding:20px">'+sinH+'</div></div></div><div class="card"><div class="card-header"><div class="card-title">Top 10 Clientes</div></div><div class="table-wrapper"><table><thead><tr><th>#</th><th>Cliente</th><th>Apolices</th><th>Total Premio</th></tr></thead><tbody>'+topH+'</tbody></table></div></div>'}

async function initApp(){loadDark();await idb.init();var existing=await idb.getAll('clientes');if(!existing||!existing.length){await seedData()}await refreshCache();await cleanupEmptyRecords();render();updateBadges()}
window.addEventListener('DOMContentLoaded',function(){initApp()});
async function seedData(){var clientes=[{id:nextId(),nome:'Joao Silva',telefone:'(11) 99999-9999',whatsapp:'5511999999999',email:'joao@email.com',cidade:'Sao Paulo',estado:'SP',status:'Ativo',criado_em:today()},{id:nextId(),nome:'Maria Santos',telefone:'(11) 88888-8888',cidade:'Rio de Janeiro',status:'Ativo',criado_em:today()}];var apolices=[{id:nextId(),nome_cliente:'Joao Silva',numero_apolice:'AP-001',ramo:'Automovel',seguradora:'Porto Seguro',premio_total:2500,comissao_perc:10,valor_comissao:250,vcto_apolice:new Date(Date.now()+15*86400000).toISOString().split('T')[0],status:'Ativa',criado_em:today()},{id:nextId(),nome_cliente:'Maria Santos',numero_apolice:'AP-002',ramo:'Vida',seguradora:'Bradesco Seguros',premio_total:1800,comissao_perc:15,valor_comissao:270,vcto_apolice:new Date(Date.now()+45*86400000).toISOString().split('T')[0],status:'Ativa',criado_em:today()}];var leads=[{id:nextId(),nome_cliente:'Carlos Oliveira',telefone:'(11) 77777-7777',interesse:'Seguro Auto',origem:'Indicacao',status:'Novo',criado_em:today()}];var propostas=[{id:nextId(),nome_cliente:'Carlos Oliveira',numero_proposta:'PR-001',ramo:'Residencial',seguradora:'SulAmerica',valor:1200,data_proposta:today(),status:'Em Analise',criado_em:today()}];var tables=['clientes','apolices','leads','propostas','producao','sinistros','agenda'];var data=[clientes,apolices,leads,propostas,[],[],[]];for(var i=0;i<tables.length;i++){await idb.setTable(tables[i],data[i]);cacheData[tables[i]]=data[i]}}
/* GEMINI IA */
var GEMINI_PROMPT='Voce e um assistente para o CRM JAF CRM. Retorne APENAS JSON sem formatacao markdown. Acoes disponiveis: {"acao":"localizar","tabela":"clientes|apolices|leads|propostas", "termo":"texto"} | {"acao":"navegar","pagina":"clientes|apolices|propostas|leads|producao|agenda|sinistros|dashboard"} | {"acao":"contar","tabela":"nome","filtro":{"campo":"valor"}} | {"acao":"responder","mensagem":"texto"} | {"acao":"criar","tabela":"clientes|leads|agenda","dados":{"campo":"valor"}}. Tabelas: clientes(nome,cpf_cnpj,telefone,status), apolices(nome_cliente,numero_apolice,ramo,seguradora,premio_total,status), leads(nome_cliente,telefone,interesse,status), propostas(nome_cliente,numero_proposta,ramo,valor,status), producao(nome,produto,valor_total,comissao,pago,status), agenda(cliente,data,tipo,status), sinistros(cliente,tipo,status). Exemplo: "localiza joao" -> {"acao":"localizar","tabela":"clientes","termo":"joao"}. "quantas apolices ativas" -> {"acao":"contar","tabela":"apolices","filtro":{"status":"Ativa"}}. "criar lead carlos telefone 1199999999" -> {"acao":"criar","tabela":"leads","dados":{"nome_cliente":"carlos","telefone":"1199999999"}}. "vai pra agenda" -> {"acao":"navegar","pagina":"agenda"}. "qual o telefone do joao" -> {"acao":"responder","mensagem":"Joao Silva: (11) 99999-9999"} (use getTable). Seja conciso. ATENCAO: SEMPRE converta datas e prazos relativos (ex: "amanha", "hoje", "proxima semana") para o formato YYYY-MM-DD. NUNCA use palavras como "amanha" no campo data.';
function toggleGemini(){var bar=document.getElementById('gemini-bar');if(bar.classList.contains('gemini-closed')){bar.classList.remove('gemini-closed');document.getElementById('gemini-input').focus()}else bar.classList.add('gemini-closed')}
function geminiAddMsg(text,tipo){var h=document.getElementById('gemini-history');var d=document.createElement('div');d.className='gemini-msg '+tipo;d.innerHTML=text;h.appendChild(d);h.scrollTop=h.scrollHeight}
function geminiSetStatus(text){document.getElementById('gemini-status').textContent=text}
async function geminiCommand(){var input=document.getElementById('gemini-input');var text=input.value.trim();if(!text){geminiSetStatus('Digite um comando');return}geminiAddMsg(escHtml(text),'user');input.value='';geminiSetStatus('Processando...');try{var dados=getTable('clientes');var apolices=getTable('apolices');var leads=getTable('leads');var propostas=getTable('propostas');var producao=getTable('producao');var agenda=getTable('agenda');var sinistros=getTable('sinistros');var ctx='Clientes:'+dados.length+' |Apolices:'+apolices.length+' |Leads:'+leads.length+' |Propostas:'+propostas.length+' |Producao:'+producao.length+' |Agenda:'+agenda.length+' |Sinistros:'+sinistros.length;var body={contents:[{parts:[{text:GEMINI_PROMPT},{text:'Contexto atual: '+ctx+'\n\nComando: '+text}]}],generationConfig:{temperature:0.1,maxOutputTokens:300}};var res=await fetch(GEMINI_WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});var data=await res.json();if(!data.candidates||!data.candidates[0])throw new Error(data.error?data.error.message:'Resposta vazia');var raw=data.candidates[0].content.parts[0].text;var json=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();var action=JSON.parse(json);geminiExecute(action)}catch(e){geminiAddMsg('Erro: '+escHtml(e.message),'error');geminiSetStatus('')}}
function geminiExecute(action){if(!action||!action.acao){geminiAddMsg('Comando nao reconhecido','error');geminiSetStatus('');return}switch(action.acao){case'localizar':{if(action.tabela&&action.termo){let t=action.tabela;let termo=action.termo.toString().toLowerCase();let dados=getTable(t);let encontrados=dados.filter(function(r){for(var k in r){if(r[k]&&r[k].toString().toLowerCase().indexOf(termo)>=0)return true}return false});if(encontrados.length===0){geminiAddMsg('Nenhum resultado em '+t+' para "'+escHtml(action.termo)+'"','bot')}else if(encontrados.length===1){let r=encontrados[0];let info='<b>'+t.slice(0,-1).toUpperCase()+'</b><br>';for(var k in r){if(k!=='id')info+=k+': '+escHtml(r[k].toString())+'<br>'}geminiAddMsg(info,'bot')}else{let lista=encontrados.slice(0,5).map(function(r,i){let nome=r.nome||r.nome_cliente||r.cliente||r.descricao||'#'+r.id;return(i+1)+'. '+escHtml(nome)}).join('<br>');geminiAddMsg(encontrados.length+' encontrados em '+t+':<br>'+lista,'bot')}if(encontrados.length>0){let paginaMap={clientes:'clientes',apolices:'apolices',leads:'leads',propostas:'propostas',producao:'producao',agenda:'agenda',sinistros:'sinistros'};let pg=paginaMap[action.tabela];if(pg){navigate(pg);setTimeout(function(){let si=document.getElementById('search-'+t);if(si){si.value=action.termo;crudFilter(t)}},100)}}geminiSetStatus('');return}}geminiAddMsg('Especifique tabela e termo para buscar','bot');geminiSetStatus('');break;case'navegar':if(action.pagina&&typeof navigate==='function'){navigate(action.pagina);geminiAddMsg('Navegando para '+action.pagina,'bot')}else geminiAddMsg('Pagina invalida','error');geminiSetStatus('');break;case'contar':{let tabela=action.tabela;let filtro=action.filtro||{};let dados=getTable(tabela);if(filtro&&Object.keys(filtro).length){let chave=Object.keys(filtro)[0];let valor=filtro[chave].toString().toLowerCase();dados=dados.filter(function(r){return r[chave]&&r[chave].toString().toLowerCase()===valor})}geminiAddMsg(dados.length+' registro(s) em '+tabela+(filtro&&Object.keys(filtro).length?' com '+Object.keys(filtro)[0]+'='+Object.values(filtro)[0]:''),'bot');geminiSetStatus('');break;}case'criar':{if(action.tabela&&action.dados){let tabela=action.tabela;let dados=getTable(tabela);let obj={id:nextId(),criado_em:today()};for(let k in action.dados)obj[k]=action.dados[k];if(tabela==='agenda'&&!obj.data)obj.data=today();if(tabela==='agenda'&&!obj.status)obj.status='Agendado';if(tabela==='leads'&&!obj.status)obj.status='Novo';if(tabela==='clientes'&&!obj.status)obj.status='Ativo';if(tabela==='propostas'&&!obj.status)obj.status='Em Analise';if(!obj.nome&&!obj.nome_cliente&&!obj.cliente&&!obj.descricao){geminiAddMsg('Nome/descricao obrigatorio','error');geminiSetStatus('');return}dados.push(obj);idb.setTable(tabela,dados).then(function(){cacheData[tabela]=dados;toast('Criado em '+tabela);render();updateBadges();enviarTabela(tabela)});geminiAddMsg('Criado registro em '+tabela,'bot');geminiSetStatus('')}else geminiAddMsg('Dados insuficientes para criar','error');break;}case'responder':geminiAddMsg(action.mensagem||'OK','bot');geminiSetStatus('');break;default:geminiAddMsg('Acao desconhecida: '+action.acao,'error');geminiSetStatus('')}}
function geminiStartVoice(){if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){geminiSetStatus('Reconhecimento de voz nao disponivel');return}var mic=document.getElementById('gemini-mic');if(mic.classList.contains('listening')){geminiSetStatus('');return}var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);var SR=window.SpeechRecognition||window.webkitSpeechRecognition;var rec=new SR();rec.lang='pt-BR';rec.interimResults=true;rec.continuous=false;mic.classList.add('listening');geminiSetStatus(isIOS?'Toque e fale sem pausas longas...':'Ouvindo...');rec.onresult=function(e){var t='';for(var i=0;i<e.results.length;i++){if(e.results[i].isFinal)t+=e.results[i][0].transcript}if(t){document.getElementById('gemini-input').value=t;mic.classList.remove('listening');geminiCommand()}};rec.onerror=function(){mic.classList.remove('listening');geminiSetStatus('')};rec.onend=function(){mic.classList.remove('listening')};rec.start()}
